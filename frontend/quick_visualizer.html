<!DOCTYPE html>
<html>

<head>
    <title>Quick Sort Visualizer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        
        #array-container {
            margin-top: 40px;
            height: 200px;
        }
        
        .box {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            margin: 5px;
            background-color: lightblue;
            font-weight: bold;
            border-radius: 5px;
        }
        
        button {
            margin: 5px;
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <h2>Quick Sort Visualizer</h2>

    <input type="text" id="inputArray" placeholder="Enter numbers separated by space" size="40">
    <button onclick="generateSteps()">Generate Steps</button>

    <br><br>

    <button onclick="start()">Start ▶</button>
    <button onclick="pause()">Pause ⏸</button>
    <button onclick="previousStep()">Previous ⏮</button>
    <button onclick="nextStep()">Next ⏭</button>

    <div id="stepInfo"></div>
    <div id="array-container"></div>

    <script>
        let arr = [];
        let steps = [];
        let currentStep = 0;
        let interval;

        function generateSteps() {

            arr = document.getElementById("inputArray").value
                .trim().split(/\s+/).map(Number);

            steps = [];
            steps.push({
                array: [...arr],
                colors: {}
            });

            quickSort(arr, 0, arr.length - 1);

            let finalColors = {};
            for (let i = 0; i < arr.length; i++) finalColors[i] = "green";

            steps.push({
                array: [...arr],
                colors: finalColors
            });

            currentStep = 0;
            drawStep();
        }

        function quickSort(array, low, high) {
            if (low < high) {
                let pi = partition(array, low, high);
                quickSort(array, low, pi - 1);
                quickSort(array, pi + 1, high);
            }
        }

        function partition(array, low, high) {

            let pivot = array[high];

            steps.push({
                array: [...array],
                colors: {
                    [high]: "orange"
                }
            });

            let i = low - 1;

            for (let j = low; j < high; j++) {

                steps.push({
                    array: [...array],
                    colors: {
                        [j]: "red",
                        [high]: "orange"
                    }
                });

                if (array[j] < pivot) {
                    i++;
                    [array[i], array[j]] = [array[j], array[i]];

                    steps.push({
                        array: [...array],
                        colors: {
                            [i]: "green",
                            [j]: "green"
                        }
                    });
                }
            }

            [array[i + 1], array[high]] = [array[high], array[i + 1]];

            steps.push({
                array: [...array],
                colors: {
                    [i + 1]: "green"
                }
            });

            return i + 1;
        }

        function drawStep() {
            let container = document.getElementById("array-container");
            container.innerHTML = "";
            let step = steps[currentStep];

            step.array.forEach((value, index) => {
                let div = document.createElement("div");
                div.className = "box";
                div.innerText = value;
                div.style.backgroundColor = step.colors[index] || "lightblue";
                container.appendChild(div);
            });

            document.getElementById("stepInfo").innerText =
                `Step: ${currentStep+1} / ${steps.length}`;
        }

        function start() {
            interval = setInterval(() => {
                if (currentStep < steps.length - 1) {
                    currentStep++;
                    drawStep();
                } else clearInterval(interval);
            }, 700);
        }

        function pause() {
            clearInterval(interval);
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                drawStep();
            }
        }

        function previousStep() {
            if (currentStep > 0) {
                currentStep--;
                drawStep();
            }
        }
    </script>
</body>

</html>
